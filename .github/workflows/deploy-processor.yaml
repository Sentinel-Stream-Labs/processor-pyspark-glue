name: Deploy Glue Processor

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Upload PySpark Script to S3
        run: |
          BUCKET_NAME=$(aws cloudformation describe-stacks --stack-name sentinel-s3-stack --query "Stacks[0].Outputs[?OutputKey=='DataLakeBucketName'].OutputValue" --output text)
          aws s3 cp scripts/fraud_detection_processor.py s3://$BUCKET_NAME/scripts/fraud_detection_processor.py

      - name: Deploy Glue Stack
        uses: aws-actions/aws-cloudformation-github-deploy@v1
        with:
          name: sentinel-glue-stack
          template: templates/glue-resources.json
          no-fail-on-empty-changeset: "1"
